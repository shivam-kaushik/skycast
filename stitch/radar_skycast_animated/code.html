<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .ghost-border {
      border: 1.5px solid rgba(79, 70, 50, 0.15);
    }
    .text-glow {
      text-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
    }
    /* Simple entrance without keyframes as per instructions, using transition classes */
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Full Bleed Map Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover brightness-[0.6] contrast-[1.1]" data-alt="high-resolution satellite map of Kyiv region with neon weather radar heat signatures in vibrant green and purple shades" data-location="Kyiv" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY6mRnrKGiRucRmM7ddMetD10aj5S098x-uc0KkQcVwonz2C7kwxVXQzDI84X7sAMvc6Nrho1o_c-DtfxX_DlxFf3thogqtm0tJ7LzlYb1sXD8dfgahul2brzka2rRRm3JYoQaOx0H4xUoMNwiKH0LGZVrJbcfMpCIdHxQWR6VbTWDq0ws2-nEDUKrV2PudAPFCOfo144bOx-y__PtZjCRjp2AWJHJtQzrr8z5pVYg9m5mvwcQBYT3ExwHrsV421myyVh9jT9Gh0A"/>
<!-- Atmospheric Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-60"></div>
</div>
<!-- Top Navigation Shell -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center w-full px-8 max-w-screen-xl mx-auto pt-6">
<div class="flex items-center gap-2 px-4 py-2 glass-effect rounded-full ghost-border">
<span class="material-symbols-outlined text-[#FFC107]">location_on</span>
<span class="font-headline font-bold text-lg tracking-tight text-[#dee1f7]">Kyiv</span>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full glass-effect ghost-border flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95 duration-300">
<span class="material-symbols-outlined text-[#FFC107]">dark_mode</span>
</button>
<div class="text-[#dee1f7]/70 font-bold text-lg tracking-tight">°C</div>
</div>
</header>
<!-- Floating HUD: Vertical Legend & Action Buttons -->
<aside class="fixed left-8 top-1/2 -translate-y-1/2 z-40 flex flex-col gap-6">
<!-- Vertical Data Legend -->
<div class="glass-effect ghost-border p-4 rounded-lg flex flex-col items-center gap-8 shadow-[0px_24px_48px_rgba(0,0,0,0.4)]">
<div class="flex flex-col items-center gap-1">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Temp</span>
<div class="h-40 w-1.5 rounded-full bg-gradient-to-t from-blue-500 via-yellow-400 to-red-500 relative">
<div class="absolute top-1/4 -right-2 w-3 h-3 bg-white rounded-full border-2 border-surface"></div>
</div>
</div>
<div class="flex flex-col items-center gap-4">
<button class="text-[#dee1f7]/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined">air</span>
</button>
<button class="text-[#dee1f7]/70 hover:text-primary transition-colors">
<span class="material-symbols-outlined">water_drop</span>
</button>
</div>
</div>
<!-- Center/Menu Group -->
<div class="flex flex-col gap-3">
<button class="w-14 h-14 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,193,7,0.5)] active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">layers</span>
</button>
<button class="w-14 h-14 glass-effect ghost-border rounded-full flex items-center justify-center text-[#dee1f7] active:scale-95 transition-transform">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</aside>
<!-- Right Side: Layer Selection Sheet (Floating Style) -->
<aside class="fixed right-8 top-1/2 -translate-y-1/2 z-40">
<div class="glass-effect ghost-border p-3 rounded-lg flex flex-col gap-4 shadow-[0px_24px_48px_rgba(0,0,0,0.4)]">
<button class="flex flex-col items-center p-3 rounded-lg bg-white/10 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">radar</span>
<span class="text-[8px] font-bold uppercase tracking-tighter mt-1">Radar</span>
</button>
<button class="flex flex-col items-center p-3 rounded-lg text-on-surface/60 hover:bg-white/5 transition-all">
<span class="material-symbols-outlined">thermostat</span>
<span class="text-[8px] font-bold uppercase tracking-tighter mt-1">Temp</span>
</button>
<button class="flex flex-col items-center p-3 rounded-lg text-on-surface/60 hover:bg-white/5 transition-all">
<span class="material-symbols-outlined">rainy</span>
<span class="text-[8px] font-bold uppercase tracking-tighter mt-1">Precip</span>
</button>
<button class="flex flex-col items-center p-3 rounded-lg text-on-surface/60 hover:bg-white/5 transition-all">
<span class="material-symbols-outlined">aq</span>
<span class="text-[8px] font-bold uppercase tracking-tighter mt-1">AQI</span>
</button>
</div>
</aside>
<!-- Bottom Interactive Section: Timeline Scrub & Navigation -->
<div class="fixed bottom-0 left-0 right-0 z-50 pointer-events-none">
<!-- Timeline Scrub Slider -->
<div class="max-w-screen-md mx-auto mb-32 px-6 pointer-events-auto">
<div class="glass-effect ghost-border rounded-full py-4 px-8 shadow-[0px_24px_48px_rgba(0,0,0,0.4)] flex flex-col gap-2">
<div class="flex justify-between items-center px-2">
<span class="text-label-sm font-bold tracking-widest text-primary">LIVE RADAR</span>
<span class="text-label-sm font-bold tracking-widest text-on-surface/60">14:00 PM</span>
</div>
<div class="relative w-full h-12 flex items-center gap-4 overflow-hidden">
<!-- Timeline ticks and times -->
<div class="flex items-end justify-between w-full text-[10px] font-bold text-on-surface/40 uppercase">
<span>10 AM</span>
<span>11 AM</span>
<span class="text-primary-fixed">12 PM</span>
<span>01 PM</span>
<span class="text-on-surface">02 PM</span>
<span>03 PM</span>
<span>04 PM</span>
<span>05 PM</span>
</div>
<!-- Playhead Scrub -->
<div class="absolute bottom-0 left-[60%] w-0.5 h-12 bg-primary shadow-[0_0_10px_rgba(255,228,175,0.8)]">
<div class="absolute -top-1 -left-1.5 w-4 h-4 bg-primary rounded-full border-2 border-surface"></div>
</div>
</div>
</div>
</div>
<!-- Shared Bottom Navigation -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center px-6 py-3 pointer-events-auto">
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full bg-white/10 dark:bg-[#1a1f2f]/40 backdrop-blur-3xl border border-white/10 ghost-border shadow-[0px_24px_48px_rgba(0,0,0,0.4)] flex justify-around items-center py-2 px-4">
<a class="flex items-center justify-center text-[#dee1f7] w-12 h-12 hover:bg-white/20 rounded-full transition-all scale-100 hover:scale-110" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<!-- Active Radar Tab -->
<a class="flex items-center justify-center bg-white dark:bg-[#dee1f7] text-[#0e1322] rounded-full w-12 h-12 shadow-[0_0_15px_rgba(255,255,255,0.5)] scale-100 hover:scale-110" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">radar</span>
</a>
<a class="flex items-center justify-center text-[#dee1f7] w-12 h-12 hover:bg-white/20 rounded-full transition-all scale-100 hover:scale-110" href="#">
<span class="material-symbols-outlined">air</span>
</a>
<a class="flex items-center justify-center text-[#dee1f7] w-12 h-12 hover:bg-white/20 rounded-full transition-all scale-100 hover:scale-110" href="#">
<span class="material-symbols-outlined">more_horiz</span>
</a>
</div>
</nav>
</div>
<!-- Focus Detail Card (Bento Style Fragment) -->
<div class="fixed bottom-40 right-8 z-40 w-64 pointer-events-auto">
<div class="glass-effect ghost-border p-5 rounded-lg shadow-2xl flex flex-col gap-4">
<div class="flex items-center justify-between">
<span class="text-label-sm font-bold uppercase tracking-widest text-primary">Alert Status</span>
<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
</div>
<div>
<h3 class="text-headline-md font-bold text-on-surface">Storm Front</h3>
<p class="text-body-lg text-on-surface/70 leading-tight mt-1">Approaching from the Northwest. Estimated arrival: 15:45.</p>
</div>
<div class="flex gap-2">
<div class="flex-1 bg-surface-container-highest/40 p-2 rounded-md border border-white/5">
<span class="block text-[10px] text-on-surface/50 font-bold uppercase">Precip</span>
<span class="block font-bold">84%</span>
</div>
<div class="flex-1 bg-surface-container-highest/40 p-2 rounded-md border border-white/5">
<span class="block text-[10px] text-on-surface/50 font-bold uppercase">Gusts</span>
<span class="block font-bold">42 <span class="text-[10px]">KM/H</span></span>
</div>
</div>
</div>
</div>
</body></html>
